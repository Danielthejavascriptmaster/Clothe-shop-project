<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LA Caps</title>
    <link rel="stylesheet" href="/LA-cap.css">
</head>
<body>

      <header>
        <div class="nav-container">
            <div class="logo">★ Risi Frutti ™</div>

            <nav class="nav">
                <ul>
                    <li><a href="">Contact</a></li>
                    <li><a href="">Shop</a></li>
                    <li><a href="">About</a></li>

                </ul>
            </nav>

            <div class="nav-icons">
                <a href="">Search</a>

        <div class="detail-container">

            <div class="image-section">

                    <label>Quantity</label>
                    <input type="number" value="1" min="1">

                <div class="product-info">
                    <p> Premium baby-blue LA cap, designed with comfort and style.
                    Perfect for casual wear or streetwear looks.

                    </p>
                </div>
